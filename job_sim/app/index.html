<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOBSIM — 직무 시뮬레이션 적성 탐색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08090a;
      --surface:   #111215;
      --border:    #1e2025;
      --muted:     #4a4f5c;
      --text:      #f7f8f8;
      --text-sub:  #8a8f9c;
      --accent:    #5e6ad2;
      --accent-hi: #7b83e0;
      --danger:    #e05e5e;
      --success:   #5ec98e;
      --warn:      #d2a85e;
      --radius:    10px;
      --max-w:     720px;
    }

    html { background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; font-size: 15px; line-height: 1.65; }
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }

    .page { width: 100%; max-width: var(--max-w); animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── 헤더 ── */
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:48px; }
    .brand-logo { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; letter-spacing:-.5px; }
    .brand-name { font-size:14px; font-weight:600; color:var(--text); letter-spacing:-.3px; flex:1; }

    /* ── 서버 상태 인디케이터 ── */
    .server-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-sub); padding:3px 9px; border-radius:20px; border:1px solid var(--border); cursor:pointer; }
    .server-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
    .server-badge.ok .dot { background:var(--success); }
    .server-badge.warn .dot { background:var(--warn); }
    .server-badge.err .dot { background:var(--danger); }

    /* ── API 키 배너 ── */
    .api-banner { background:#13120a; border:1px solid #3a2e0e; border-radius:8px; padding:14px 18px; margin-bottom:20px; font-size:13px; }
    .api-banner strong { color:var(--warn); }
    .api-key-row { display:flex; gap:8px; margin-top:10px; }
    .api-key-input { flex:1; background:var(--bg); border:1.5px solid var(--border); border-radius:6px; color:var(--text); font-family:monospace; font-size:12px; padding:8px 12px; outline:none; }
    .api-key-input:focus { border-color:var(--accent); }

    /* ── 제목 ── */
    .screen-title { font-size:22px; font-weight:700; margin-bottom:8px; letter-spacing:-.5px; }
    .screen-desc  { color:var(--text-sub); font-size:14px; margin-bottom:32px; }

    /* ── 카드 ── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }

    /* ── 직무 카드 ── */
    .job-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; margin-bottom:28px; }
    .job-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px 18px; cursor:pointer; transition:border-color .15s, background .15s; }
    .job-card:hover { border-color:var(--accent); }
    .job-card.selected { border-color:var(--accent); background:#14163a; }
    .job-card .job-icon { font-size:26px; margin-bottom:10px; }
    .job-card .job-name { font-size:14px; font-weight:600; margin-bottom:4px; }
    .job-card .job-cluster { font-size:12px; color:var(--text-sub); }

    /* ── 텍스트 입력 ── */
    textarea { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:14px; line-height:1.7; padding:14px 16px; resize:vertical; min-height:120px; outline:none; transition:border-color .15s; }
    textarea:focus { border-color:var(--accent); }
    textarea::placeholder { color:var(--muted); }
    textarea:disabled { opacity:.5; cursor:not-allowed; }

    /* ── 버튼 ── */
    .btn { display:inline-flex; align-items:center; gap:8px; padding:11px 22px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; border:none; outline:none; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { opacity:.85; }
    .btn-sm { padding:7px 14px; font-size:13px; }
    .btn-ghost { background:transparent; border:1.5px solid var(--border); color:var(--text-sub); }
    .btn-ghost:hover { border-color:var(--accent); color:var(--text); }
    .btn:disabled { opacity:.35; cursor:not-allowed; }

    /* ── 진행 바 ── */
    .progress-bar { width:100%; height:2px; background:var(--border); border-radius:2px; margin-bottom:32px; }
    .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s ease; }

    /* ── 배지 ── */
    .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; background:#1a1c2e; color:var(--accent); }
    .badge-fallback { background:#1a1208; color:var(--warn); }

    /* ── 미션 ── */
    .mission-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .mission-step   { font-size:12px; color:var(--text-sub); }
    .scenario-box { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:18px 20px; margin-bottom:20px; font-size:14px; color:var(--text-sub); line-height:1.8; }
    .task-box { margin-bottom:20px; }
    .task-label { font-size:12px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px; }
    .task-text  { font-size:15px; font-weight:500; color:var(--text); line-height:1.7; }

    /* ── 객관식 ── */
    .option-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
    .option-btn { background:var(--surface); border:1.5px solid var(--border); border-radius:8px; padding:14px 18px; text-align:left; color:var(--text); font-family:inherit; font-size:14px; cursor:pointer; transition:border-color .15s, background .15s; line-height:1.5; }
    .option-btn:hover { border-color:var(--accent); }
    .option-btn.selected { border-color:var(--accent); background:#14163a; }
    .option-btn:disabled { opacity:.5; cursor:not-allowed; }

    /* ── 로딩 오버레이 ── */
    .loading-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-top:16px; }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:14px; color:var(--text-sub); }

    /* ── 채점 결과 패널 ── */
    .score-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-top:16px; animation:fadeIn .3s ease; }
    .score-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .score-panel-title { font-size:13px; font-weight:700; color:var(--text); }
    .score-source { font-size:11px; padding:2px 8px; border-radius:4px; font-weight:600; }
    .score-source.llm { background:#0d1a12; color:var(--success); }
    .score-source.fallback { background:#1a1208; color:var(--warn); }

    /* 미니 축 바 */
    .axis-bars { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
    .axis-row { display:flex; align-items:center; gap:10px; }
    .axis-name { font-size:12px; color:var(--text-sub); min-width:100px; white-space:nowrap; }
    .axis-bar-wrap { flex:1; height:5px; background:var(--border); border-radius:3px; }
    .axis-bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }
    .axis-score-num { font-size:12px; font-weight:700; min-width:28px; text-align:right; }

    /* 피드백 텍스트 */
    .score-feedback { font-size:13px; color:var(--text-sub); line-height:1.7; padding:14px 16px; background:var(--bg); border-radius:8px; border-left:3px solid var(--accent); }

    /* ── 자기보고 ── */
    .self-report { border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-top:16px; }
    .sr-title { font-size:13px; font-weight:600; color:var(--text-sub); margin-bottom:18px; text-transform:uppercase; letter-spacing:.6px; }
    .sr-row { margin-bottom:18px; }
    .sr-question { font-size:14px; color:var(--text); margin-bottom:10px; }
    .sr-options { display:flex; gap:8px; }
    .sr-btn { flex:1; padding:9px 6px; border-radius:7px; font-size:13px; font-weight:500; border:1.5px solid var(--border); background:var(--surface); color:var(--text-sub); cursor:pointer; transition:border-color .15s, color .15s, background .15s; text-align:center; }
    .sr-btn:hover { border-color:var(--accent); color:var(--text); }
    .sr-btn.selected { border-color:var(--accent); background:#14163a; color:var(--text); }

    /* ── 사전 질문 ── */
    .pre-q-card { margin-bottom:24px; }
    .pre-q-job-label { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:12px; }
    .pre-q-text { font-size:15px; font-weight:500; margin-bottom:12px; }

    /* ── 결과 ── */
    .result-section { margin-bottom:40px; }
    .result-section-title { font-size:14px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:.8px; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }

    /* 레이더 */
    .radar-wrap { display:flex; justify-content:center; margin-bottom:12px; }
    svg.radar { overflow:visible; }

    /* 적합도 */
    .compat-list { display:flex; flex-direction:column; gap:14px; }
    .compat-row { display:flex; align-items:center; gap:14px; }
    .compat-name { font-size:13px; font-weight:600; min-width:130px; }
    .compat-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; }
    .compat-bar { height:100%; border-radius:3px; background:var(--accent); transition:width .6s ease; }
    .compat-score { font-size:13px; font-weight:700; min-width:40px; text-align:right; }

    /* 사분면 */
    .quad-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .quad-cell { border:1.5px solid var(--border); border-radius:8px; padding:16px 14px; font-size:13px; }
    .quad-cell.highlight { border-color:var(--accent); background:#14163a; }
    .quad-job-name { font-weight:700; margin-bottom:4px; font-size:14px; }
    .quad-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .quad-desc  { color:var(--text-sub); font-size:12px; line-height:1.5; }
    .quad-q1 .quad-label { color:var(--success); }
    .quad-q2 .quad-label { color:var(--warn); }
    .quad-q3 .quad-label { color:var(--accent-hi); }
    .quad-q4 .quad-label { color:var(--danger); }

    /* 기대-현실 */
    .gap-table { width:100%; border-collapse:collapse; }
    .gap-table th, .gap-table td { padding:12px 14px; text-align:left; font-size:13px; border-bottom:1px solid var(--border); vertical-align:top; }
    .gap-table th { color:var(--text-sub); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.6px; }
    .gap-table td:first-child { color:var(--accent); font-weight:600; white-space:nowrap; }

    hr { border:none; border-top:1px solid var(--border); margin:28px 0; }

    @media (max-width:520px) {
      .job-grid { grid-template-columns:1fr 1fr; }
      .quad-grid { grid-template-columns:1fr; }
      .sr-options { flex-wrap:wrap; }
      .sr-btn { flex:0 0 auto; min-width:80px; }
    }
  </style>
</head>

  { "mission_id":"quality_01","job_code":"quality_engineer","job_name":"품질관리 엔지니어","cluster_id":"C5","title":"불량 패턴 관찰","scenario":"생산라인에서 지난 2주 동안 납품된 제품 중 반품률이 갑자기 3.2%에서 8.7%로 급등했습니다. 품질팀장이 당신에게 데이터를 건네며 '내일 오전까지 원인 분석 초안을 만들어줘'라고 요청했습니다. 반품 건들을 살펴보니 A라인과 B라인의 비율이 8:2이고, 반품 유형은 '외관 불량'이 60%, '치수 오차'가 30%, '기능 불량'이 10%입니다.","task":"위 데이터를 보고, 가장 먼저 확인해야 할 관찰 포인트 3가지를 설명하고 각각 왜 중요한지 서술해주세요.","input_type":"text","options":null,"axis_signals":{"AX1":0.2,"AX2":0.45,"AX3":0.2,"AX4":0.05,"AX5":0.1},"rubric":{"AX1":["데이터","비율","수치","분포","통계","분석"],"AX2":["A라인","B라인","외관","치수","관찰","확인","패턴","시점","추적"],"AX3":["우선순위","원인","가설","전략","접근"],"AX4":["팀","협업","공유","보고"],"AX5":["고객","납품처","클레임","소통"]} },

  { "mission_id":"cx_manager_01","job_code":"cx_manager","job_name":"고객경험 매니저","cluster_id":"C6","title":"고객 불만 접수 대응","scenario":"온라인 쇼핑몰 고객서비스팀의 당신에게 오늘 오전 한 고객이 격한 어조로 전화를 걸었습니다. '3일 전에 주문한 선물용 케이크가 아직도 안 왔는데, 오늘이 생일 당일이에요! 고객센터에 두 번이나 연락했는데 매번 확인 후 연락 드린다고만 하고 아무 연락이 없었어요. 어떻게 할 거예요?'라고 말하고 있습니다. 시스템을 확인하니 배송사 측 오류로 배송이 지연됐고, 해당 상품은 현재 재고가 없는 상태입니다.","task":"이 고객에게 지금 당장 어떻게 응대할지 구체적인 말과 행동을 단계별로 서술해주세요.","input_type":"text","options":null,"axis_signals":{"AX1":0.1,"AX2":0.1,"AX3":0.15,"AX4":0.1,"AX5":0.55},"rubric":{"AX1":["확인","시스템","기록","정보"],"AX2":["상황파악","확인","체크"],"AX3":["해결책","대안","제안","보상"],"AX4":["팀","배송사","협조","에스컬레이션"],"AX5":["사과","공감","이해","사용자","고객","배려","감정","소통","안심"]} },

  { "mission_id":"cx_manager_03","job_code":"cx_manager","job_name":"고객경험 매니저","cluster_id":"C6","title":"고객 경험 개선 제안","scenario":"환불 처리 지연 문제를 조사한 결과, 환불 승인이 여러 부서를 거치며 평균 7.2일이 걸리는 것으로 나타났습니다. 경쟁사의 평균은 2.1일입니다. 현재 프로세스는 '고객 신청 → CS팀 검토 → 물류팀 확인 → 재무팀 최종 승인 → 환불 처리' 순서입니다. 팀장은 '30만 원 이하 소액 환불은 더 빠르게 처리하고 싶다'고 했습니다.","task":"소액 환불을 빠르게 처리하기 위한 개선안을 제안하고, 그 과정에서 고객에게 어떻게 커뮤니케이션할지 함께 설명해주세요.","input_type":"text","options":null,"axis_signals":{"AX1":0.15,"AX2":0.1,"AX3":0.25,"AX4":0.15,"AX5":0.35},"rubric":{"AX1":["기준","소액","30만","데이터","분석"],"AX2":["프로세스","단계","확인","파악"],"AX3":["개선안","방안","제안","단계축소","자동화","권한"],"AX4":["부서","협조","승인","프로세스개선","팀"],"AX5":["고객","사용자","안내","커뮤니케이션","알림","신뢰","소통","안심"]} },
  { "mission_id":"consultant_01","job_code":"strategy_consultant","job_name":"전략 컨설턴트","cluster_id":"C1","title":"시장 진입 가능성 탐색","scenario":"중소 이커머스 업체 D사의 CEO가 '동남아 시장에 우리 제품을 판매하고 싶다'고 의뢰했습니다. D사는 국내 뷰티 소비재를 판매하며 연매출 80억 원 규모입니다. 하지만 현재 해외 물류, 현지 마케팅, 규제 대응 경험이 전무합니다. 팀원이 아직 초기 정보 수집 단계라며 당신에게 '이 프로젝트에서 가장 먼저 확인해야 할 것들이 뭐예요?'라고 물었습니다.","task":"이 프로젝트에서 가장 먼저 조사하고 파악해야 할 핵심 질문 3가지를 선정하고, 각 질문이 왜 중요한지 설명해주세요.","input_type":"text","options":null,"axis_signals":{"AX1":0.25,"AX2":0.2,"AX3":0.3,"AX4":0.15,"AX5":0.1},"rubric":{"AX1":["데이터","정보","분석","조사","수치","시장규모"],"AX2":["경쟁사","규제","현지","파악","탐색","확인"],"AX3":["핵심","우선순위","전략","목표","방향","선정"],"AX4":["팀","역할","분배","이해관계자","CEO"],"AX5":["고객","소비자","니즈","현지반응","인터뷰"]} },

/** 서버 상태 확인 (앱 시작 시 1회 호출) */
async function checkServer() {
  try {
    const r = await fetch(`${SERVER}/api/health`, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) throw new Error('not ok');
    const data = await r.json();
    state.serverAvailable = data.api_key_set;
    updateServerBadge();
  } catch {
    state.serverAvailable = false;
    updateServerBadge();
  }
}

function updateServerBadge() {
  const badge = document.getElementById('server-badge');
  if (!badge) return;
  if (state.serverAvailable === true) {
    badge.className = 'server-badge ok';
    badge.innerHTML = '<span class="dot"></span> Claude AI 채점';
  } else if (state.serverAvailable === false) {
    badge.className = 'server-badge err';
    badge.innerHTML = '<span class="dot"></span> 키워드 폴백';
  } else {
    badge.className = 'server-badge';
    badge.innerHTML = '<span class="dot"></span> 연결 확인 중…';
  }
}

/**
 * LLM 채점 (서버 호출)
 * 반환: { AX1:0~1, AX2:0~1, ..., feedback:"...", source:"llm" }
 */
async function scoreAnswerLLM(answer, mission) {
  const r = await fetch(`${SERVER}/api/score`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answer, mission }),
    signal: AbortSignal.timeout(30000),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  if (data.fallback) throw new Error(data.error || 'fallback');

  // 0~100 → 0~1
  const axes = ['AX1','AX2','AX3','AX4','AX5'];
  const scores = {};
  axes.forEach(ax => { scores[ax] = (data[ax] || 0) / 100; });
  scores.feedback = data.feedback || '';
  scores.source   = 'llm';
  return scores;
}

/**
 * 키워드 폴백 채점 (서버 없을 때)
 * 반환: { AX1:0~1, ..., feedback:"", source:"fallback" }
 */
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

function scoreAnswerFallback(answer, mission) {
  const text = (answer || '').toLowerCase();
  const axes  = ['AX1','AX2','AX3','AX4','AX5'];
  const scores = {};

  axes.forEach(ax => {
    const kws = mission.rubric[ax] || [];
    if (!kws.length) { scores[ax] = 0.3; return; }
    let cnt = 0;
    kws.forEach(kw => { if (text.includes(kw.toLowerCase())) cnt++; });
    const max  = kws.length;
    scores[ax] = sigmoid((cnt - max * 0.3) / (max * 0.3 + 0.01));
  });

  scores.feedback = '키워드 기반 채점 (서버 연결 필요 시 Claude AI 분석 가능)';
  scores.source   = 'fallback';
  return scores;
}

/**
 * 통합 채점 함수 — LLM 시도, 실패 시 폴백
 */
async function scoreAnswer(answer, mission) {
  if (state.serverAvailable) {
    try {
      return await scoreAnswerLLM(answer, mission);
    } catch (e) {
      console.warn('LLM 채점 실패, 폴백 사용:', e.message);
      state.serverAvailable = false;
      updateServerBadge();
    }
  }
  return scoreAnswerFallback(answer, mission);
}

/** 미션별 점수 목록 → 5축 평균 프로파일 */
function computeProfile(scoresList) {
  const axes = ['AX1','AX2','AX3','AX4','AX5'];
  const totals = Object.fromEntries(axes.map(ax => [ax, 0]));
  let cnt = 0;
  scoresList.forEach(sc => {
    axes.forEach(ax => { totals[ax] += sc[ax] || 0; });
    cnt++;
  });
  const profile = {};
  axes.forEach(ax => { profile[ax] = cnt > 0 ? totals[ax] / cnt : 0; });
  return profile;
}

/** 코사인 유사도 */
function cosineSim(a, b) {
  const axes = ['AX1','AX2','AX3','AX4','AX5'];
  const va = axes.map(k => a[k] || 0);
  const vb = axes.map(k => b[k] || 0);
  const dot  = va.reduce((s, v, i) => s + v * vb[i], 0);
  const magA = Math.sqrt(va.reduce((s, v) => s + v*v, 0));
  const magB = Math.sqrt(vb.reduce((s, v) => s + v*v, 0));
  if (magA * magB === 0) return 0;
  return dot / (magA * magB);
}

/** 사용자 프로파일 × 군집 가중치 → 직업별 적합도 0~100 */
function computeCompatibility(profile) {
  const result = {};
  state.selectedJobs.forEach(jc => {
    const jd = JOB_DEFS.find(j => j.job_code === jc);
    if (!jd) { result[jc] = 0; return; }
    const cw = CLUSTER_WEIGHTS[jd.cluster_id];
    if (!cw) { result[jc] = 0; return; }
    const sim = cosineSim(profile, cw);
    result[jc] = Math.round((sim + 1) / 2 * 100);
  });
  return result;
}

/** 자기보고 감정 점수 0~1 (3문항 종합) */
function emotionScore(jobCode) {
  const missions = getMissionsForJob(jobCode);
  let sum = 0, cnt = 0;
  missions.forEach(m => {
    const sr = state.selfReport[m.mission_id];
    if (!sr) return;
    // fun: 1=재밌음, 3=지루함 → 높을수록 좋게 역변환
    const funScore     = (4 - sr.fun)       / 3;   // 1=1.0, 2=0.67, 3=0.33
    // difficulty: 1=쉬움(=능력 과잉?), 2=적당(+), 3=어려움(낮음)
    const diffScore    = (4 - sr.difficulty) / 3;
    // imagine: 1=할만함, 2=모름, 3=싫음
    const imagineScore = (4 - sr.imagine)    / 3;
    // 가중 합산: 재밌음 50%, 상상 30%, 난이도 20%
    sum += funScore * 0.5 + imagineScore * 0.3 + diffScore * 0.2;
    cnt++;
  });
  return cnt > 0 ? sum / cnt : 0.5;
}

/** 성과 점수: 미션 채점 결과의 전체 평균 0~1 */
function perfScore(jobCode) {
  const scores = state.missionScores[jobCode] || [];
  if (!scores.length) return 0;
  const axes = ['AX1','AX2','AX3','AX4','AX5'];
  const avg  = scores.reduce((s, sc) =>
    s + axes.reduce((a, k) => a + (sc[k] || 0), 0) / axes.length, 0
  ) / scores.length;
  return avg;
}

function getMissionsForJob(jc) { return ALL_MISSIONS.filter(m => m.job_code === jc); }
function getCurrentMission() {
  const jc = state.selectedJobs[state.missionJobIndex];
  return getMissionsForJob(jc)[state.missionStepIndex] || null;
}
function totalMissionCount()     { return state.selectedJobs.reduce((s,jc) => s + getMissionsForJob(jc).length, 0); }
function completedMissionCount() {
  let n = 0;
  for (let i = 0; i < state.missionJobIndex; i++) n += getMissionsForJob(state.selectedJobs[i]).length;
  n += state.missionStepIndex;
  return n;
}
function isLastMission() {
  const jc = state.selectedJobs[state.missionJobIndex];
  const ms = getMissionsForJob(jc);
  return state.missionJobIndex === state.selectedJobs.length - 1
      && state.missionStepIndex === ms.length - 1;
}

      ${state.preqIndex > 0 ? '<button class="btn btn-ghost" id="btn-preq-back">← 이전</button>' : ''}
      <button class="btn btn-primary" id="btn-preq-next" style="margin-left:auto;">
        ${state.preqIndex < state.selectedJobs.length-1 ? '다음 직무 →' : '미션 시작 →'}
      </button>
    </div>`;
}

/* ── 화면 3: 미션 수행 ── */
function renderMission() {
  const mission = getCurrentMission();
  if (!mission) return '<p>미션을 찾을 수 없습니다.</p>';

  const jc  = state.selectedJobs[state.missionJobIndex];
  const jd  = JOB_DEFS.find(j => j.job_code === jc);
  const pct = Math.round((completedMissionCount() / totalMissionCount()) * 100);
  const ms  = getMissionsForJob(jc);

  /* 답변 입력 UI */
  const disabled = state.submitting || !!state.currentScore;
  let answerUI = '';
  if (mission.input_type === 'multiple_choice' && mission.options) {
    answerUI = `<div class="option-list">${mission.options.map((opt, i) => {
      const sel = state.selectedOption === i ? 'selected' : '';
      return `<button class="option-btn ${sel}" data-opt="${i}" ${disabled?'disabled':''}>${opt}</button>`;
    }).join('')}</div>`;
  } else {
    answerUI = `<textarea id="mission-answer" placeholder="여기에 답변을 작성하세요…" rows="6"
      ${disabled ? 'disabled' : ''}>${state.missionAnswer}</textarea>`;
  }

  /* 로딩 오버레이 */
  const loadingUI = state.submitting ? `
    <div class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Claude AI가 답변을 분석하는 중…</div>
    </div>` : '';

  /* 채점 결과 패널 (점수 받은 후 표시) */
  let scoreUI = '';
  if (state.currentScore && !state.submitting) {
    const sc  = state.currentScore;
    const src = sc.source === 'llm';
    const bars = ['AX1','AX2','AX3','AX4','AX5'].map(ax => {
      const pct  = Math.round((sc[ax] || 0) * 100);
      const col  = AX_COLORS[ax];
      return `<div class="axis-row">
        <span class="axis-name">${AX_LABELS[ax]}</span>
        <div class="axis-bar-wrap">
          <div class="axis-bar-fill" style="width:${pct}%;background:${col};"></div>
        </div>
        <span class="axis-score-num" style="color:${col};">${pct}</span>
      </div>`;
    }).join('');

    scoreUI = `<div class="score-panel">
      <div class="score-panel-header">
        <span class="score-panel-title">채점 완료</span>
        <span class="score-source ${src ? 'llm':'fallback'}">${src ? '✦ Claude AI':'키워드 분석'}</span>
      </div>
      <div class="axis-bars">${bars}</div>
      ${sc.feedback ? `<div class="score-feedback">💬 ${sc.feedback}</div>` : ''}
    </div>`;
  }

  /* 자기보고 (채점 완료 후 표시) */
  const sr       = state.selfReport[mission.mission_id] || {};
  const srDone   = !!(sr.fun && sr.difficulty && sr.imagine);
  const showSR   = !!state.currentScore && !state.submitting;
  const srUI     = showSR ? `
    <div class="self-report">
      <div class="sr-title">미션 마무리 — 잠깐 돌아보기</div>
      <div class="sr-row">
        <div class="sr-question">이 미션, 어떠했어?</div>
        <div class="sr-options">
          <button class="sr-btn ${sr.fun===1?'selected':''}" data-sr="fun" data-val="1">😄 재밌었어</button>
          <button class="sr-btn ${sr.fun===2?'selected':''}" data-sr="fun" data-val="2">😐 보통</button>
          <button class="sr-btn ${sr.fun===3?'selected':''}" data-sr="fun" data-val="3">😑 지루했어</button>
        </div>
      </div>
      <div class="sr-row">
        <div class="sr-question">난이도는?</div>
        <div class="sr-options">
          <button class="sr-btn ${sr.difficulty===1?'selected':''}" data-sr="difficulty" data-val="1">😌 쉬웠어</button>
          <button class="sr-btn ${sr.difficulty===2?'selected':''}" data-sr="difficulty" data-val="2">🤔 적당했어</button>
          <button class="sr-btn ${sr.difficulty===3?'selected':''}" data-sr="difficulty" data-val="3">😓 어려웠어</button>
        </div>
      </div>
      <div class="sr-row">
        <div class="sr-question">이 일을 매일 8시간 한다고 상상하면?</div>
        <div class="sr-options">
          <button class="sr-btn ${sr.imagine===1?'selected':''}" data-sr="imagine" data-val="1">👍 할 만함</button>
          <button class="sr-btn ${sr.imagine===2?'selected':''}" data-sr="imagine" data-val="2">🤷 모르겠음</button>
          <button class="sr-btn ${sr.imagine===3?'selected':''}" data-sr="imagine" data-val="3">👎 싫음</button>
        </div>
      </div>
    </div>` : '';

  /* 버튼 */
  const answerReady = mission.input_type === 'multiple_choice'
    ? state.selectedOption !== null
    : state.missionAnswer.trim().length > 10;

  let bottomUI = '';
  if (!state.currentScore && !state.submitting) {
    bottomUI = `<button class="btn btn-primary" id="btn-submit" style="margin-top:20px;" ${answerReady?'':'disabled'}>
      채점하기 ✦
    </button>`;
  } else if (state.currentScore && !state.submitting) {
    const nextReady = srDone;
    bottomUI = `<button class="btn btn-primary" id="btn-mission-next" style="margin-top:20px;" ${nextReady?'':'disabled'}>
      ${isLastMission() ? '결과 보기 →' : '다음 미션 →'}
    </button>`;
  }

  return `${renderBrand()}
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="mission-header">
      <span class="badge">${jd.icon} ${jd.job_name}</span>
      <span class="mission-step">미션 ${state.missionStepIndex+1} / ${ms.length}</span>
    </div>
    <h1 class="screen-title">${mission.title}</h1>
    <div class="scenario-box">${mission.scenario}</div>
    <div class="task-box">
      <div class="task-label">📋 수행 과제</div>
      <div class="task-text">${mission.task}</div>
    </div>
    ${answerUI}
    ${loadingUI}
    ${scoreUI}
    ${srUI}
    ${bottomUI}`;
}

/* ── 화면 4: 결과 ── */
function renderResult() {
  const allScores = Object.values(state.missionScores).flat();
  state.axisProfile   = computeProfile(allScores);
  state.compatibility = computeCompatibility(state.axisProfile);

  return `${renderBrand()}
    <h1 class="screen-title">당신의 직무 적성 프로파일</h1>
    <p class="screen-desc">미션 수행 패턴과 자기보고를 종합 분석했습니다.</p>
    ${renderRadarSection()}
    ${renderCompatSection()}
    ${renderQuadSection()}
    ${renderGapSection()}
    <hr />
    <button class="btn btn-ghost" id="btn-restart">↺ 처음부터 다시하기</button>`;
}

/* ── 레이더 차트 (SVG 직접 구현) ── */
function renderRadarSection() {
  const profile = state.axisProfile;
  const axes    = ['AX1','AX2','AX3','AX4','AX5'];
  const N = axes.length, cx = 180, cy = 180, R = 120, labelR = R+32;

  function pt(r, i) {
    const a = (Math.PI*2*i/N) - Math.PI/2;
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  }

  let grid = '';
  [0.25,0.5,0.75,1.0].forEach(ratio => {
    const pts = axes.map((_,i) => pt(R*ratio, i).join(','));
    grid += `<polygon points="${pts.join(' ')}" fill="none" stroke="#1e2025" stroke-width="1"/>`;
  });

  const axisLines = axes.map((_,i) => {
    const [x,y] = pt(R, i);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#1e2025" stroke-width="1"/>`;
  }).join('');

  const userPts = axes.map((ax,i) => pt(R*(profile[ax]||0), i).join(','));
  const userPoly = `<polygon points="${userPts.join(' ')}" fill="rgba(94,106,210,0.22)" stroke="#5e6ad2" stroke-width="2.5"/>`;

  const labels = axes.map((ax,i) => {
    const [lx,ly] = pt(labelR, i);
    const anchor  = lx < cx-8 ? 'end' : lx > cx+8 ? 'start' : 'middle';
    const score   = Math.round((profile[ax]||0)*100);
    const col     = AX_COLORS[ax];
    return `<text x="${lx}" y="${ly+4}" text-anchor="${anchor}" style="fill:#f7f8f8;font-size:11.5px;font-weight:600;">${AX_LABELS[ax]}</text>
            <text x="${lx}" y="${ly+17}" text-anchor="${anchor}" style="fill:${col};font-size:11px;font-weight:700;">${score}</text>`;
  }).join('');

  return `<div class="result-section">
    <div class="result-section-title">사고방식 5축 프로파일</div>
    <div class="radar-wrap">
      <svg class="radar" width="360" height="360" viewBox="0 0 360 360">
        ${grid}${axisLines}${userPoly}${labels}
      </svg>
    </div>
  </div>`;
}

/* ── 직업별 적합도 ── */
function renderCompatSection() {
  const items = state.selectedJobs
    .map(jc => {
      const jd = JOB_DEFS.find(j => j.job_code === jc);
      return { jc, name:jd?.job_name||jc, icon:jd?.icon||'', score:state.compatibility[jc]||0 };
    })
    .sort((a,b) => b.score - a.score);

  const rows = items.map(it => {
    const col = it.score>=70 ? 'var(--success)' : it.score>=50 ? 'var(--accent)' : 'var(--muted)';
    return `<div class="compat-row">
      <span class="compat-name">${it.icon} ${it.name}</span>
      <div class="compat-bar-wrap"><div class="compat-bar" style="width:${it.score}%;background:${col};"></div></div>
      <span class="compat-score" style="color:${col};">${it.score}점</span>
    </div>`;
  }).join('');

  return `<div class="result-section">
    <div class="result-section-title">직무 적합도</div>
    <div class="compat-list">${rows}</div>
  </div>`;
}

/* ── 사분면 분석 ── */
function renderQuadSection() {
  const QUADS = {
    q1: { label:'강한 후보',        desc:'잘했고 즐거웠어. 적성과 동기가 모두 일치해.',                cls:'quad-q1' },
    q2: { label:'능력은 있지만…',   desc:'성과는 좋지만 흥미가 낮아. 지속 동기를 점검해봐.',           cls:'quad-q2' },
    q3: { label:'학습 가능성',      desc:'즐거웠지만 아직 서투른 것 같아. 경험이 쌓이면 달라질 수 있어.', cls:'quad-q3' },
    q4: { label:'비적합',           desc:'성과도 낮고 즐겁지도 않았어. 다른 방향이 맞을 수 있어.',       cls:'quad-q4' },
  };
  const cards = state.selectedJobs.map(jc => {
    const jd   = JOB_DEFS.find(j => j.job_code === jc);
    const perf = perfScore(jc);
    const emo  = emotionScore(jc);
    const q    = perf >= 0.45 && emo >= 0.6 ? 'q1'
               : perf >= 0.45 && emo <  0.6 ? 'q2'
               : perf <  0.45 && emo >= 0.6 ? 'q3' : 'q4';
    const qd   = QUADS[q];
    return `<div class="quad-cell ${qd.cls} ${q==='q1'?'highlight':''}">
      <div class="quad-job-name">${jd?.icon||''} ${jd?.job_name||jc}</div>
      <div class="quad-label">${qd.label}</div>
      <div class="quad-desc">${qd.desc}</div>
    </div>`;
  }).join('');
  return `<div class="result-section">
    <div class="result-section-title">성과 × 감정 사분면</div>
    <div class="quad-grid">${cards}</div>
  </div>`;
}

/* ── 기대-현실 격차 ── */
function renderGapSection() {
  const rows = state.selectedJobs.map(jc => {
    const jd  = JOB_DEFS.find(j => j.job_code === jc);
    const ans = state.preqAnswers[jc] || {};
    const m1  = getMissionsForJob(jc)[0];
    const m2  = getMissionsForJob(jc)[1];
    return `<tr>
      <td>${jd?.icon||''} ${jd?.job_name||jc}</td>
      <td>
        <div style="margin-bottom:6px;"><span style="color:var(--text-sub);font-size:11px;">예상 주요 업무</span><br>${ans.q1||'(입력 없음)'}</div>
        <div><span style="color:var(--text-sub);font-size:11px;">예상 핵심 능력</span><br>${ans.q2||'(입력 없음)'}</div>
      </td>
      <td>
        <div style="margin-bottom:6px;"><span style="color:var(--text-sub);font-size:11px;">실제 미션 1</span><br>${m1?m1.title+' — '+m1.task.slice(0,55)+'…':''}</div>
        <div><span style="color:var(--text-sub);font-size:11px;">실제 미션 2</span><br>${m2?m2.title+' — '+m2.task.slice(0,55)+'…':''}</div>
      </td>
    </tr>`;
  }).join('');
  return `<div class="result-section">
    <div class="result-section-title">기대 vs 현실</div>
    <div style="overflow-x:auto;">
      <table class="gap-table">
        <thead><tr><th>직무</th><th>사전 예상</th><th>실제 미션</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════════
   이벤트 바인딩
══════════════════════════════════════════════════════════════ */
function attachEvents() {

  /* 직무 카드 선택 */
  document.querySelectorAll('.job-card').forEach(el =>
    el.addEventListener('click', () => {
      const jc = el.dataset.jobcode;
      const i  = state.selectedJobs.indexOf(jc);
      if (i >= 0) state.selectedJobs.splice(i,1); else state.selectedJobs.push(jc);
      render();
    })
  );

  /* API 키 입력 */
  const btnSetKey = document.getElementById('btn-set-key');
  if (btnSetKey) {
    btnSetKey.addEventListener('click', async () => {
      const key = document.getElementById('api-key-input')?.value?.trim();
      if (!key) return;
      const msg = document.getElementById('key-msg');
      if (msg) msg.textContent = '서버에 연결 중…';
      const ok  = await sendApiKey(key);
      if (msg) msg.textContent = ok ? '✓ 연결 성공 — Claude AI 채점이 활성화됩니다.' : '✗ 연결 실패. 서버가 실행 중인지 확인하세요.';
      render();
    });
  }

  /* 시작 버튼 */
  document.getElementById('btn-start')?.addEventListener('click', () => {
    state.screen    = 'preq';
    state.preqIndex = 0;
    render();
  });

  /* 사전 질문 이전/다음 */
  document.getElementById('btn-preq-back')?.addEventListener('click', () => {
    state.preqIndex--;
    render();
  });
  document.getElementById('btn-preq-next')?.addEventListener('click', () => {
    const jc = state.selectedJobs[state.preqIndex];
    state.preqAnswers[jc] = {
      q1: document.getElementById('preq-q1')?.value || '',
      q2: document.getElementById('preq-q2')?.value || '',
    };
    if (state.preqIndex < state.selectedJobs.length-1) {
      state.preqIndex++;
      render();
    } else {
      state.screen           = 'mission';
      state.missionJobIndex  = 0;
      state.missionStepIndex = 0;
      state.missionAnswer    = '';
      state.selectedOption   = null;
      state.currentScore     = null;
      render();
    }
  });

  /* 답변 텍스트 변경 */
  document.getElementById('mission-answer')?.addEventListener('input', e => {
    state.missionAnswer = e.target.value;
    refreshSubmitBtn();
  });

  /* 객관식 선택 */
  document.querySelectorAll('.option-btn').forEach(el =>
    el.addEventListener('click', () => {
      if (state.submitting || state.currentScore) return;
      state.selectedOption = parseInt(el.dataset.opt);
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      refreshSubmitBtn();
    })
  );

  /* ─── 채점 버튼 (async) ─── */
  document.getElementById('btn-submit')?.addEventListener('click', async () => {
    const mission = getCurrentMission();
    if (!mission) return;

    const answer = mission.input_type === 'multiple_choice'
      ? (mission.options[state.selectedOption] || '')
      : state.missionAnswer;

    /* 로딩 상태 */
    state.submitting = true;
    state.currentScore = null;
    render();

    /* 채점 API 호출 */
    const scored = await scoreAnswer(answer, mission);

    /* 결과 저장 */
    if (!state.missionScores[mission.job_code]) state.missionScores[mission.job_code] = [];
    state.missionScores[mission.job_code].push(scored);
    state.missionFeedback[mission.mission_id] = scored;

    state.submitting = false;
    state.currentScore = scored;
    render();
  });

  /* 자기보고 버튼 */
  document.querySelectorAll('.sr-btn').forEach(el =>
    el.addEventListener('click', () => {
      const mission = getCurrentMission();
      if (!mission) return;
      if (!state.selfReport[mission.mission_id]) state.selfReport[mission.mission_id] = {};
      state.selfReport[mission.mission_id][el.dataset.sr] = parseInt(el.dataset.val);
      el.closest('.sr-options').querySelectorAll('.sr-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      refreshNextBtn();
    })
  );

  /* 다음 미션 버튼 */
  document.getElementById('btn-mission-next')?.addEventListener('click', () => {
    const mission = getCurrentMission();
    if (!mission) return;
    state.currentScore  = null;
    state.missionAnswer = '';
    state.selectedOption = null;
    advanceMission();
  });

  /* 다시하기 */
  document.getElementById('btn-restart')?.addEventListener('click', () => {
    Object.assign(state, {
      screen:'select', selectedJobs:[], preqIndex:0, preqAnswers:{},
      missionJobIndex:0, missionStepIndex:0, missionAnswer:'', selectedOption:null,
      selfReport:{}, missionScores:{}, missionFeedback:{}, axisProfile:null, compatibility:{},
      submitting:false, currentScore:null,
    });
    render();
  });
}

function refreshSubmitBtn() {
  const btn     = document.getElementById('btn-submit');
  if (!btn) return;
  const mission = getCurrentMission();
  if (!mission) return;
  const ready   = mission.input_type === 'multiple_choice'
    ? state.selectedOption !== null
    : state.missionAnswer.trim().length > 10;
  btn.disabled  = !ready;
}

function refreshNextBtn() {
  const btn     = document.getElementById('btn-mission-next');
  if (!btn) return;
  const mission = getCurrentMission();
  if (!mission) return;
  const sr      = state.selfReport[mission.mission_id] || {};
  btn.disabled  = !(sr.fun && sr.difficulty && sr.imagine);
}

function advanceMission() {
  const jc  = state.selectedJobs[state.missionJobIndex];
  const ms  = getMissionsForJob(jc);
  if (state.missionStepIndex < ms.length-1) {
    state.missionStepIndex++;
  } else if (state.missionJobIndex < state.selectedJobs.length-1) {
    state.missionJobIndex++;
    state.missionStepIndex = 0;
  } else {
    state.screen = 'result';
  }
  render();
}

/* ══════════════════════════════════════════════════════════════
   초기화
══════════════════════════════════════════════════════════════ */
checkServer().then(() => render());   // 서버 확인 후 첫 렌더
render();                             // 즉시 첫 화면 표시 (로딩 전)
</script>
</body>
</html>
